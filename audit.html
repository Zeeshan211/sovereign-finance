<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Log — Sovereign Finance</title>
    <script src="/js/sf-theme-switcher.js"></script>
    <link rel="stylesheet" href="/css/sf-theme.css">
    <link rel="stylesheet" href="/css/sf-shell.css">
</head>
<body class="sf-shell-body">
    <div class="sf-app-shell sf-app-shell--with-nav">
        <aside class="sf-finance-sidebar" id="sf-sidebar"></aside>

        <main class="sf-page-shell">
            <section class="sf-page-content">
                <div class="sf-page-hero">
                    <div class="sf-page-title-group">
                        <span class="sf-page-eyebrow">Control / QA</span>
                        <h1 class="sf-page-title">Audit Log</h1>
                        <p class="sf-page-subtitle">Every state-changing action recorded with timestamp, actor, and payload diff. Read-only.</p>
                    </div>
                    <div class="sf-page-actions">
                        <span class="sf-pill sf-pill--info" id="audit-summary">loading…</span>
                    </div>
                </div>

                <div class="sf-panel">
                    <div class="sf-section-head">
                        <div>
                            <p class="sf-section-kicker">Filter</p>
                            <h3 class="sf-section-title">Action filter</h3>
                        </div>
                        <div class="sf-section-meta">
                            <button id="auditRefresh" class="sf-button sf-button--primary" title="Refresh">↻ Refresh</button>
                        </div>
                    </div>
                    <div class="sf-form-grid">
                        <div class="sf-field sf-span-6">
                            <label for="actionFilter">Action type</label>
                            <select id="actionFilter" class="sf-select">
                                <option value="">All actions</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="sf-panel">
                    <div class="sf-section-head">
                        <div>
                            <p class="sf-section-kicker">Log</p>
                            <h3 class="sf-section-title">Recorded actions</h3>
                            <p class="sf-section-subtitle">Newest first. Showing currently-loaded set.</p>
                        </div>
                    </div>
                    <div id="audit-list">
                        <div class="sf-empty-state"><div><p>Loading audit log…</p></div></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/audit.js"></script>
</body>
</html>
