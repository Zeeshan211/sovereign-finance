<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050816">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Transactions · Sovereign Finance</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/theme.js"></script>
  <script src="/js/nav.js" defer></script>
</head>
<body>
  <header>
    <div class="brand">Sovereign Ops</div>
    <h1 class="title">Transactions</h1>
    <div class="day-badge"><span id="txCount">0 entries</span></div>
  </header>

  <div class="view-controls">
    <input id="searchInput" type="search" placeholder="Search account, category, notes, TX ID…" class="form-input search-input">
    <div class="view-toggle">
      <button class="view-btn" data-view="compact" title="Compact">▤</button>
      <button class="view-btn active" data-view="standard" title="Standard">☰</button>
      <button class="view-btn" data-view="dense" title="Dense">▦</button>
    </div>
  </div>

  <details class="filter-panel" id="filterPanel">
    <summary class="filter-summary">
      <span>🎚️ Advanced Filters</span>
      <span class="filter-active-badge" id="filterActiveBadge" style="display:none;">●</span>
    </summary>
    <div class="filter-grid">
      <div class="filter-field">
        <label class="field-label">From Date</label>
        <input id="filterFrom" type="date" class="form-input">
      </div>
      <div class="filter-field">
        <label class="field-label">To Date</label>
        <input id="filterTo" type="date" class="form-input">
      </div>
      <div class="filter-field">
        <label class="field-label">Type</label>
        <select id="filterType" class="form-select">
          <option value="">All types</option>
          <option value="income">Income</option>
          <option value="expense">Expense</option>
          <option value="transfer">Transfer</option>
          <option value="cc_payment">CC Payment</option>
          <option value="cc_spend">CC Spend</option>
        </select>
      </div>
      <div class="filter-field">
        <label class="field-label">Account</label>
        <select id="filterAccount" class="form-select"><option value="">All accounts</option></select>
      </div>
      <div class="filter-field">
        <label class="field-label">Category</label>
        <select id="filterCategory" class="form-select"><option value="">All categories</option></select>
      </div>
      <div class="filter-field">
        <label class="field-label">Min Amount</label>
        <input id="filterMin" type="number" placeholder="0" class="form-input">
      </div>
      <div class="filter-field">
        <label class="field-label">Max Amount</label>
        <input id="filterMax" type="number" placeholder="∞" class="form-input">
      </div>
      <div class="filter-field filter-actions">
        <button id="filterClear" class="ghost-btn">Clear All</button>
      </div>
    </div>
  </details>

  <div id="txList" class="tx-list view-standard"></div>
  <div id="emptyState" class="empty-state">No transactions yet.</div>

  <footer><span class="v">v0.9.0 · transactions</span></footer>

  <script src="/js/app.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/transactions.js"></script>
</body>
</html>
