<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#050816">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Accounts · Sovereign Finance</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/theme.js"></script>
  <script src="/js/nav.js" defer></script>
</head>
<body>
  <header>
    <div class="brand">Sovereign Ops</div>
    <h1 class="title">Accounts</h1>
    <div class="day-badge"><span id="acc-summary">loading…</span></div>
  </header>

  <section class="net-worth">
    <div class="nw-label">Net Worth</div>
    <div id="acc-net-worth" class="nw-value positive counter">—<span class="nw-currency">PKR</span></div>
  </section>

  <div class="section-header">
    <span id="acc-assets-count" class="section-label">Assets</span>
    <span id="acc-assets-total" class="section-total assets">—</span>
    <button id="addAccountBtn" class="ghost-btn" style="margin-left:auto;font-size:12px;padding:4px 10px">+ Add</button>
  </div>
  <div id="acc-assets-list"></div>

  <div class="section-header">
    <span id="acc-liabilities-count" class="section-label">Liabilities</span>
    <span id="acc-liabilities-total" class="section-total liabilities">—</span>
  </div>
  <div id="acc-liabilities-list"></div>

  <div class="section-header" id="acc-archived-header" style="display:none">
    <span id="acc-archived-count" class="section-label">Archived</span>
    <button id="acc-archived-toggle" class="ghost-btn" style="margin-left:auto;font-size:12px;padding:4px 10px">Show</button>
  </div>
  <div id="acc-archived-list" style="display:none"></div>

  <footer>
    <span class="v">v0.6.0 · accounts</span>
  </footer>

  <!-- Add Account Modal -->
  <div id="addAccountModal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-title">Add Account</div>

      <label class="field-label">Name</label>
      <input id="addAccountName" type="text" placeholder="e.g. UBL Savings, Sadapay" class="form-input" maxlength="60">

      <label class="field-label">Icon (emoji)</label>
      <input id="addAccountIcon" type="text" placeholder="🏦" class="form-input" maxlength="4">

      <label class="field-label">Type</label>
      <select id="addAccountKind" class="form-select">
        <option value="bank">Bank</option>
        <option value="cash">Cash</option>
        <option value="wallet">E-Wallet</option>
        <option value="prepaid">Prepaid Card</option>
        <option value="cc">Credit Card</option>
      </select>

      <label class="field-label">Opening Balance (optional)</label>
      <input id="addAccountOpening" type="number" inputmode="decimal" step="0.01" placeholder="0" class="amount-input">

      <label class="field-label">Display Order (optional)</label>
      <input id="addAccountOrder" type="number" min="0" placeholder="99" class="form-input">

      <div class="modal-actions">
        <button id="addAccountCancel" class="ghost-btn">Cancel</button>
        <button id="addAccountConfirm" class="primary-btn">Add Account</button>
      </div>
    </div>
  </div>

  <!-- Edit Account Modal -->
  <div id="editAccountModal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-title" id="editAccountTitle">Edit Account</div>
      <div class="modal-sub" id="editAccountSub">id: …</div>

      <label class="field-label">Name</label>
      <input id="editAccountName" type="text" class="form-input" maxlength="60">

      <label class="field-label">Icon (emoji)</label>
      <input id="editAccountIcon" type="text" class="form-input" maxlength="4">

      <label class="field-label">Type</label>
      <select id="editAccountKind" class="form-select">
        <option value="bank">Bank</option>
        <option value="cash">Cash</option>
        <option value="wallet">E-Wallet</option>
        <option value="prepaid">Prepaid Card</option>
        <option value="cc">Credit Card</option>
      </select>

      <label class="field-label">Opening Balance</label>
      <input id="editAccountOpening" type="number" inputmode="decimal" step="0.01" class="amount-input">

      <label class="field-label">Display Order</label>
      <input id="editAccountOrder" type="number" min="0" class="form-input">

      <div class="modal-actions">
        <button id="editAccountArchive" class="ghost-btn">Archive</button>
        <button id="editAccountDelete" class="ghost-btn">Delete</button>
        <button id="editAccountCancel" class="ghost-btn">Cancel</button>
        <button id="editAccountConfirm" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="/" class="nav-item">
        <div class="nav-emoji">🏠</div>
        <div class="nav-text">Hub</div>
      </a>
      <a href="/add.html" class="nav-item">
        <div class="nav-emoji">➕</div>
        <div class="nav-text">Add</div>
      </a>
      <a href="/accounts.html" class="nav-item active">
        <div class="nav-emoji">🏦</div>
        <div class="nav-text">Accounts</div>
      </a>
      <a href="/debts.html" class="nav-item">
        <div class="nav-emoji">💳</div>
        <div class="nav-text">Debts</div>
      </a>
    </div>
  </nav>

  <script src="/js/app.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/numbers.js"></script>
  <script src="/js/accounts.js"></script>
</body>
</html>
