<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  >

  <meta name="theme-color" content="#050816">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>Accounts · Sovereign Finance</title>

  <link rel="stylesheet" href="/css/sf-theme.css">
  <link rel="stylesheet" href="/css/sf-shell.css">

  <script src="/js/sf-theme-switcher.js" defer></script>
  <script src="/js/sf-components.js" defer></script>
  <script src="/js/sf-shell.js" defer></script>

  <style>
    .sf-app-shell--with-nav {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 24px;
      width: min(100%, 1680px);
      margin: 0 auto;
      padding: 24px;
    }

    .sf-finance-sidebar {
      position: sticky;
      top: 24px;
      height: calc(100vh - 48px);
      overflow: auto;
      border: 1px solid var(--sf-border);
      border-radius: 24px;
      background: linear-gradient(180deg, var(--sf-card-strong), var(--sf-card));
      padding: 18px;
      box-shadow: var(--sf-shadow-sm);
    }

    .sf-sidebar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 18px;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--sf-border-subtle);
    }

    .sf-sidebar-logo {
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--sf-accent), var(--sf-positive));
      font-weight: 800;
      color: #fff;
    }

    .sf-sidebar-title {
      font-weight: 800;
      color: var(--sf-text);
    }

    .sf-sidebar-sub {
      font-size: 12px;
      color: var(--sf-text-muted);
      margin-top: 2px;
    }

    .sf-nav-section {
      margin: 18px 0;
    }

    .sf-nav-kicker {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--sf-text-faint);
      font-weight: 800;
      margin: 0 0 8px;
    }

    .sf-nav-list {
      display: grid;
      gap: 6px;
    }

    .sf-nav-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      color: var(--sf-text-soft);
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
    }

    .sf-nav-link:hover,
    .sf-nav-link.is-active {
      background: var(--sf-accent-soft);
      border-color: var(--sf-border-strong);
      color: var(--sf-accent-strong);
    }

    .sf-page-shell {
      min-width: 0;
    }

    .sf-money-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .sf-row-stack {
      display: grid;
      gap: 10px;
    }

    .mini-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px;
      border: 1px solid var(--sf-border-subtle);
      border-radius: 16px;
      background: var(--sf-surface-1);
      margin-bottom: 10px;
    }

    .mini-row-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mini-row-icon {
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--sf-accent-soft);
      color: var(--sf-accent-strong);
      font-weight: 800;
      flex: 0 0 auto;
    }

    .mini-row-meta {
      min-width: 0;
    }

    .mini-row-name {
      font-weight: 800;
      color: var(--sf-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-row-sub {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
      color: var(--sf-text-muted);
      font-size: 12px;
    }

    .mini-row-right {
      text-align: right;
      display: grid;
      justify-items: end;
      gap: 4px;
      flex: 0 0 auto;
    }

    .mini-row-amount {
      font-weight: 900;
      color: var(--sf-text);
      font-size: 16px;
    }

    .mini-row-amount.danger,
    .value.danger,
    .liabilities {
      color: var(--sf-danger);
    }

    .assets,
    .accent,
    .positive {
      color: var(--sf-positive);
    }

    .meta {
      font-size: 12px;
      color: var(--sf-text-muted);
    }

    .meta.warn {
      color: var(--sf-warning);
    }

    .meta.danger {
      color: var(--sf-danger);
    }

    .ghost-btn,
    .primary-btn,
    .danger-btn {
      border: 1px solid var(--sf-border);
      border-radius: 999px;
      padding: 9px 13px;
      background: var(--sf-surface-1);
      color: var(--sf-text-soft);
      font-weight: 800;
      cursor: pointer;
    }

    .primary-btn {
      background: var(--sf-accent-soft);
      color: var(--sf-accent-strong);
      border-color: var(--sf-border-strong);
    }

    .danger-btn {
      background: var(--sf-danger-soft);
      color: var(--sf-danger);
      border-color: rgba(255, 127, 138, 0.28);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.62);
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal {
      width: min(560px, 100%);
      max-height: 88vh;
      overflow: auto;
      border: 1px solid var(--sf-border);
      border-radius: 24px;
      background: var(--sf-card-strong);
      padding: 22px;
      box-shadow: var(--sf-shadow-lg);
    }

    .modal-title {
      font-size: 22px;
      font-weight: 900;
      color: var(--sf-text);
    }
