<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Accounts · Sovereign Finance</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header>
    <div class="brand">Sovereign Ops</div>
    <h1 class="title">Accounts</h1>
    <div class="day-badge"><span id="acc-day-count">— active</span> · Day <span id="dayNum">—</span> of 90</div>
  </header>

  <section class="net-worth">
    <div class="nw-label">Net Worth</div>
    <div id="acc-net-worth" class="nw-value positive">—<span class="nw-currency">PKR</span></div>
  </section>

  <div class="section-header">
    <span id="acc-assets-count" class="section-label">Assets</span>
    <span id="acc-assets-total" class="section-total assets">—</span>
  </div>
  <div id="acc-assets-list"></div>

  <div class="section-header">
    <span id="acc-liabilities-count" class="section-label">Liabilities</span>
    <span id="acc-liabilities-total" class="section-total liabilities">—</span>
  </div>
  <div id="acc-liabilities-list"></div>

  <footer>
    <span class="v">v0.1.0 · accounts</span>
  </footer>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="/" class="nav-item">
        <div class="nav-emoji">🏠</div>
        <div class="nav-text">Hub</div>
      </a>
      <a href="/add.html" class="nav-item">
        <div class="nav-emoji">➕</div>
        <div class="nav-text">Add</div>
      </a>
      <a href="/accounts.html" class="nav-item active">
        <div class="nav-emoji">🏦</div>
        <div class="nav-text">Accounts</div>
      </a>
      <a href="/transactions.html" class="nav-item">
        <div class="nav-emoji">📋</div>
        <div class="nav-text">List</div>
      </a>
    </div>
  </nav>

  <script src="/js/app.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/accounts.js"></script>
</body>
</html>
