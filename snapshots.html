<!doctype html>
<html lang="en" data-theme="midnight" data-page="snapshots">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <title>Snapshots · Sovereign Finance</title>

  <link rel="stylesheet" href="/css/app.css?v=1.0.0" />

  <style>
    .snap-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .snap-hero {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-md);
      padding: 24px;
      margin-bottom: 18px;
    }

    .snap-kicker {
      display: inline-flex;
      padding: 7px 11px;
      border-radius: var(--r-pill);
      background: var(--warn-soft);
      color: var(--warn);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 12px;
    }

    .snap-heading {
      color: var(--text);
      font-size: clamp(32px, 5vw, 48px);
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: -0.05em;
      margin: 0;
    }

    .snap-copy {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.55;
      font-weight: 750;
      margin-top: 12px;
      max-width: 760px;
    }

    .snap-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .snap-stat {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
      padding: 16px;
    }

    .snap-stat-label {
      color: var(--text-dim);
      font-size: 11px;
      font-weight: 950;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .snap-stat-value {
      margin-top: 7px;
      color: var(--text);
      font-size: 24px;
      font-weight: 950;
      font-variant-numeric: tabular-nums;
    }

    .snap-panel {
      background: var(--surface-1);
      border: 1px solid var(--border);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-sm);
      padding: 16px;
    }

    .snap-panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .snap-panel-title {
      color: var(--text);
      font-size: 18px;
      font-weight: 950;
    }

    .snap-refresh {
      min-height: 42px;
      border: 1px solid var(--border-strong);
      border-radius: var(--r-md);
      background: #ffffff;
      color: var(--text);
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 950;
    }

    .snap-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .snap-card {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 14px;
    }

    .snap-icon {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: #ffffff;
      border: 1px solid var(--border);
      font-size: 24px;
    }

    .snap-title {
      color: var(--text);
      font-size: 15px;
      font-weight: 950;
      line-height: 1.3;
      overflow-wrap: anywhere;
    }

    .snap-meta {
      margin-top: 4px;
      color: var(--text-dim);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .snap-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .snap-action {
      min-height: 38px;
      border-radius: var(--r-md);
      border: 1px solid var(--border-strong);
      background: #ffffff;
      color: var(--text);
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
    }

    .snap-action.danger {
      border-color: rgba(220, 38, 38, 0.24);
      background: var(--danger-soft);
      color: var(--danger);
    }

    .snap-empty {
      background: var(--surface-2);
      border: 1px dashed var(--border-strong);
      border-radius: var(--r-xl);
      padding: 28px;
      text-align: center;
      color: var(--text-muted);
      font-weight: 850;
      line-height: 1.5;
    }

    .snap-empty strong {
      display: block;
      color: var(--text);
      font-size: 17px;
      margin-bottom: 6px;
    }

    @media (max-width: 820px) {
      .snap-stats {
        grid-template-columns: 1fr;
      }

      .snap-card {
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .snap-actions {
        grid-column: 2;
        justify-content: flex-start;
        flex-wrap: wrap;
      }
    }
  </style>
</head>

<body>
  <header>
    <div>
      <div class="brand">Sovereign Finance</div>
      <div class="title">Snapshots</div>
    </div>
  </header>

  <main class="snap-wrap">
    <section class="snap-hero">
      <div class="snap-kicker">Restore shelf</div>
      <h1 class="snap-heading">Snapshots</h1>
      <p class="snap-copy">
        Snapshots are saved recovery points before risky mutations. Hub shows live truth; this page shows restore history.
      </p>
    </section>

    <section class="snap-stats">
      <div class="snap-stat">
        <div class="snap-stat-label">Snapshots</div>
        <div id="snapCount" class="snap-stat-value">—</div>
      </div>
      <div class="snap-stat">
        <div class="snap-stat-label">Latest</div>
        <div id="snapLatest" class="snap-stat-value">—</div>
      </div>
      <div class="snap-stat">
        <div class="snap-stat-label">Mode</div>
        <div class="snap-stat-value">Read Only</div>
      </div>
    </section>

    <section class="snap-panel">
      <div class="snap-panel-head">
        <div class="snap-panel-title">Saved Restore Points</div>
        <button id="refreshBtn" class="snap-refresh" type="button">Refresh</button>
      </div>

      <div id="snapList" class="snap-list">
        <div class="snap-empty">Loading snapshots…</div>
      </div>
    </section>

    <footer class="page-footer">
      <span class="v">v0.2.0 · layer 3 snapshots rendering · api snapshots</span>
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/js/theme.js?v=0.7.5"></script>
  <script src="/js/nav.js?v=1.0.0"></script>

  <script>
    const $ = id => document.getElementById(id);

    function esc(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function fmtTime(value) {
      if (!value) return '—';

      const raw = String(value);
      const d = new Date(raw.includes('T') ? raw : raw.replace(' ', 'T') + 'Z');

      if (Number.isNaN(d.getTime())) return raw;

      return d.toLocaleString('en-PK', {
        month: 'short',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function normalizeSnapshots(data) {
      if (Array.isArray(data.snapshots)) return data.snapshots;
      if (Array.isArray(data.rows)) return data.rows;
      if (Array.isArray(data.items)) return data.items;
      return [];
    }

    async function fetchJSON(url) {
      const res = await fetch(url, { cache: 'no-store' });
      const data = await res.json().catch(() => null);

      if (!res.ok || !data || data.ok === false) {
        throw new Error((data && data.error) || ('HTTP ' + res.status));
      }

      return data;
    }

    function titleFor(snapshot) {
      return snapshot.label ||
        snapshot.name ||
        snapshot.id ||
        snapshot.snapshot_id ||
        'Snapshot';
    }

    function createdFor(snapshot) {
      return snapshot.created_at ||
        snapshot.timestamp ||
        snapshot.created ||
        snapshot.generated_at ||
        null;
    }

    function metaFor(snapshot) {
      const parts = [];

      if (snapshot.snapshot_id) parts.push('ID ' + snapshot.snapshot_id);
      else if (snapshot.id) parts.push('ID ' + snapshot.id);

      if (snapshot.created_by) parts.push('by ' + snapshot.created_by);
      if (snapshot.table_count != null) parts.push(snapshot.table_count + ' tables');
      if (snapshot.row_count != null) parts.push(snapshot.row_count + ' rows');

      const created = createdFor(snapshot);
      if (created) parts.push(fmtTime(created));

      return parts.length ? parts.join(' · ') : 'Saved restore point';
    }

    function renderSnapshots(rows) {
      document.getElementById('snapCount').textContent = String(rows.length);

      const latest = rows[0] ? createdFor(rows[0]) : null;
      document.getElementById('snapLatest').textContent = latest ? fmtTime(latest) : 'None';

      if (!rows.length) {
        document.getElementById('snapList').innerHTML = `
          <div class="snap-empty">
            <strong>No snapshots saved yet.</strong>
            Snapshot API is working, but there are no restore points in storage.
            Snapshots should appear here after mutations that call the snapshot contract.
          </div>
        `;
        return;
      }

      document.getElementById('snapList').innerHTML = rows.map(snapshot => `
        <article class="snap-card">
          <div class="snap-icon">📸</div>

          <div>
            <div class="snap-title">${esc(titleFor(snapshot))}</div>
            <div class="snap-meta">${esc(metaFor(snapshot))}</div>
          </div>

          <div class="snap-actions">
            <button class="snap-action" type="button" disabled>View</button>
            <button class="snap-action danger" type="button" disabled>Restore</button>
          </div>
        </article>
      `).join('');
    }

    async function loadSnapshots() {
      document.getElementById('snapList').innerHTML = '<div class="snap-empty">Loading snapshots…</div>';

      try {
        const data = await fetchJSON('/api/snapshots');
        const rows = normalizeSnapshots(data);

        renderSnapshots(rows);
      } catch (err) {
        document.getElementById('snapCount').textContent = '0';
        document.getElementById('snapLatest').textContent = 'Error';
        document.getElementById('snapList').innerHTML = `<div class="snap-empty"><strong>Snapshots failed.</strong>${esc(err.message)}</div>`;
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', loadSnapshots);

    loadSnapshots();
  </script>
</body>
</html>
