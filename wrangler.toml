name = "sovereign-finance"
pages_build_output_dir = "."
compatibility_date = "2026-05-01"

[[d1_databases]]
binding = "DB"
database_name = "sovereign-finance"
database_id = "9296b2f7-1c4b-4bd7-b57a-629d12a60e66"

[[r2_buckets]]
binding = "STATEMENTS"
bucket_name = "liquidityos-statements"

# ── Cron triggers ─────────────────────────────────────────────────────────────
# NOTE: Cloudflare Pages does not support cron triggers.
# These are documented here for migration to a standalone Worker.
# When migrated, uncomment and set `main = "functions/scheduled/cc-cron-runner.js"`.
#
# [triggers]
# crons = [
#   "0 2 * * *",    # interest_accrual         — daily 02:00 PKT
#   "0 3 * * *",    # statement_generation      — daily 03:00 PKT
#   "30 2 * * *",   # emi_installment_billing   — daily 02:30 PKT
#   "0 9 * * *",    # due_date_alerts           — daily 09:00 PKT
#   "0 6 * * *",    # autopay_pre_flight        — daily 06:00 PKT
#   "0 10 * * *",   # autopay_execute           — daily 10:00 PKT
#   "0 1 * * *",    # cleanup_expired_dry_runs  — daily 01:00 PKT
#   "0 5 * * *",    # cleanup_expired_notifs    — daily 05:00 PKT
#   "0 4 0 * *",    # annual_fee_check          — monthly 1st 04:00 PKT
#   "0 4 * * 0",    # subscription_detection    — weekly Sunday 04:00 PKT
#   "0 9 * * 5",    # rewards_expiry_alert      — weekly Friday 09:00 PKT
# ]

[vars]
# Set this to your Google OAuth 2.0 Client ID from Google Cloud Console.
# After deploying, also add this in Cloudflare Pages → Settings → Environment Variables.
GOOGLE_CLIENT_ID = "REPLACE_WITH_YOUR_GOOGLE_CLIENT_ID"

[ai]
binding = "AI"
