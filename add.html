<!doctype html>
<html lang="en" data-page="add">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />

  <title>Add Transaction · Sovereign Finance</title>

  <meta name="theme-color" content="#0f172a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Sovereign Finance" />

  <link rel="stylesheet" href="/css/app.css?v=0.7.5" />

  <style>
    .add-shell {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px 14px 90px;
    }

    .add-hero {
      border: 1px solid var(--border, rgba(148, 163, 184, .18));
      background: var(--card, rgba(15, 23, 42, .72));
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 16px 42px rgba(0, 0, 0, .18);
    }

    .add-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      letter-spacing: -.02em;
    }

    .add-subtitle {
      margin: 8px 0 0;
      color: var(--muted, #94a3b8);
      font-size: 13px;
      line-height: 1.45;
    }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 16px 0;
    }

    .type-btn {
      border: 1px solid var(--border, rgba(148, 163, 184, .2));
      background: rgba(15, 23, 42, .45);
      color: var(--text, #e5e7eb);
      border-radius: 16px;
      padding: 12px 10px;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .type-btn span {
      font-size: 20px;
    }

    .type-btn small {
      font-size: 11px;
      color: var(--muted, #94a3b8);
      font-weight: 700;
    }

    .type-btn.active {
      border-color: rgba(34, 197, 94, .45);
      background: rgba(34, 197, 94, .12);
      color: var(--accent, #22c55e);
    }

    .form-card {
      border: 1px solid var(--border, rgba(148, 163, 184, .18));
      background: var(--card, rgba(15, 23, 42, .72));
      border-radius: 20px;
      padding: 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin: 0 0 6px;
      color: var(--muted, #94a3b8);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .02em;
      text-transform: uppercase;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--border, rgba(148, 163, 184, .2));
      background: rgba(2, 6, 23, .42);
      color: var(--text, #e5e7eb);
      border-radius: 14px;
      padding: 12px 13px;
      font: inherit;
      outline: none;
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(34, 197, 94, .5);
      box-shadow: 0 0 0 3px rgba(34, 197, 94, .12);
    }

    .field textarea {
      min-height: 88px;
      resize: vertical;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .submit-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
    }

    .primary-btn {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 14px 16px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #052e16;
      font-family: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 30px rgba(34, 197, 94, .24);
    }

    .primary-btn:disabled {
      cursor: not-allowed;
      opacity: .45;
      box-shadow: none;
    }

    .safety-note {
      margin-top: 12px;
      color: var(--muted, #94a3b8);
      font-size: 12px;
      line-height: 1.45;
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      z-index: 9999;
      max-width: min(520px, calc(100vw - 28px));
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, .22);
      background: rgba(15, 23, 42, .96);
      color: #e5e7eb;
      box-shadow: 0 18px 50px rgba(0,0,0,.3);
      transition: .22s ease;
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast-success {
      border-color: rgba(34, 197, 94, .35);
    }

    .toast-error {
      border-color: rgba(239, 68, 68, .45);
    }

    @media (max-width: 640px) {
      .row-2 {
        grid-template-columns: 1fr;
      }

      .type-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <main class="add-shell">
      <section class="add-hero">
        <h1 class="add-title">Add Transaction</h1>
        <p class="add-subtitle">
          Add one clean ledger event. Transfers write as a two-row pair: source OUT and destination IN.
        </p>

        <div class="type-grid" aria-label="Transaction type">
          <button class="type-btn active" type="button" data-type="expense">
            <span>💸</span>
            Expense
            <small>money out</small>
          </button>

          <button class="type-btn" type="button" data-type="income">
            <span>💰</span>
            Income
            <small>money in</small>
          </button>

          <button class="type-btn" type="button" data-type="transfer">
            <span>💱</span>
            Transfer
            <small>between accounts</small>
          </button>
        </div>
      </section>

      <section class="form-card">
        <form id="addForm" autocomplete="off">
          <div class="row-2">
            <div class="field">
              <label for="dateInput">Date</label>
              <input id="dateInput" name="date" type="date" required />
            </div>

            <div class="field">
              <label for="amountInput">Amount</label>
              <input id="amountInput" name="amount" type="number" inputmode="decimal" min="0.01" step="0.01" placeholder="0.00" required />
            </div>
          </div>

          <div class="field">
            <label id="accountFromLabel" for="accountSelect">Account</label>
            <select id="accountSelect" name="account" required>
              <option value="">Pick account...</option>
            </select>
          </div>

          <div class="field" id="transferToWrap" hidden>
            <label for="transferToSelect">To Account</label>
            <select id="transferToSelect" name="transfer_to_account">
              <option value="">Pick account...</option>
            </select>
          </div>

          <div class="field" id="categoryWrap">
            <label for="categorySelect">Category</label>
            <select id="categorySelect" name="category">
              <option value="">Pick category...</option>
            </select>
          </div>

          <div class="field">
            <label for="notesInput">Notes</label>
            <textarea id="notesInput" name="notes" maxlength="200" placeholder="What happened?"></textarea>
          </div>

          <div class="submit-row">
            <button id="submitBtn" class="primary-btn" type="submit" disabled>
              Save Transaction
            </button>
          </div>

          <p class="safety-note">
            If saving fails, the transaction is not silently queued. Fix the error and submit again once.
          </p>
        </form>
      </section>

      <footer style="margin-top:18px;text-align:center;color:var(--muted,#94a3b8);font-size:12px">
        <span class="v">v0.6.2 · add full rewrite · store v0.2.3 · add v0.3.1</span>
      </footer>
    </main>
  </div>

  <script src="/js/theme.js?v=0.7.5"></script>
  <script src="/js/nav.js?v=0.7.5"></script>
  <script src="/js/store.js?v=0.2.3"></script>
  <script src="/js/add.js?v=0.3.1"></script>
</body>
</html>
