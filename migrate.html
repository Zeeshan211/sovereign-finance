<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run Migration</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1rem;
      box-sizing: border-box;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    p  { color: #94a3b8; font-size: 0.9rem; text-align: center; margin-bottom: 1.5rem; }
    button {
      background: #3b82f6;
      color: #fff;
      border: none;
      padding: 0.85rem 2rem;
      border-radius: 0.5rem;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
    }
    button:disabled { background: #475569; cursor: not-allowed; }
    pre {
      background: #1e293b;
      border-radius: 0.5rem;
      padding: 1rem;
      width: 100%;
      max-width: 480px;
      overflow-x: auto;
      font-size: 0.78rem;
      white-space: pre-wrap;
      word-break: break-all;
      margin-top: 1.5rem;
      display: none;
    }
    .ok  { color: #4ade80; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <h1>Owner ID Migration</h1>
  <p>Tap once. No login needed.<br>Fixes empty accounts &amp; transactions.</p>
  <button id="btn" onclick="run()">Run Migration</button>
  <pre id="out"></pre>

  <script>
    async function run() {
      const btn = document.getElementById('btn');
      const out = document.getElementById('out');
      btn.disabled = true;
      btn.textContent = 'Running…';
      out.style.display = 'none';
      try {
        const res = await fetch('/api/migrate-owner', { method: 'POST' });
        const data = await res.json();
        out.className = data.ok ? 'ok' : 'err';
        out.textContent = JSON.stringify(data, null, 2);
        out.style.display = 'block';
        if (data.ok) {
          btn.textContent = 'Done — log in again!';
        } else {
          btn.textContent = 'Failed (see below)';
          btn.disabled = false;
        }
      } catch (e) {
        out.className = 'err';
        out.textContent = String(e);
        out.style.display = 'block';
        btn.textContent = 'Error (see below)';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
