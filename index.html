<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sovereign Finance — Hub</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">🛡️ Sovereign Finance</div>
  <nav class="nav">
    <a href="/">Hub</a>
    <a href="/transactions.html">Transactions</a>
    <a href="/debts.html">Debts</a>
    <a href="/bills.html">Bills</a>
    <a href="/audit.html">Audit</a>
  </nav>
  <button id="themeToggle" class="theme-btn" title="Toggle theme">🌓</button>
</header>

<main class="container">

  <!-- ─── ADD TRANSACTION FORM ─────────────────────────────── -->
  <section class="card">
    <h2>➕ Add Transaction</h2>
    <form id="addTxnForm" class="txn-form" autocomplete="off">
      <div class="row">
        <label>Date
          <input type="date" id="f_date" required />
        </label>
        <label>Type
          <select id="f_type" required>
            <option value="expense">💸 Expense</option>
            <option value="income">💰 Income</option>
            <option value="transfer">💱 Transfer</option>
            <option value="cc_payment">💳 CC Payment</option>
            <option value="cc_spend">💳 CC Spend</option>
            <option value="borrow">📥 Borrow (debt in)</option>
            <option value="repay">📤 Repay (debt out)</option>
            <option value="atm">🏧 ATM</option>
          </select>
        </label>
        <label>Amount (PKR)
          <input type="number" id="f_amount" min="0.01" step="0.01" required placeholder="0.00" />
        </label>
      </div>

      <div class="row">
        <label>Account
          <select id="f_account" required>
            <option value="">— select —</option>
          </select>
        </label>
        <label id="f_transferLabel" style="display:none">To Account
          <select id="f_transferTo">
            <option value="">— select destination —</option>
          </select>
        </label>
        <label>Category
          <select id="f_category">
            <option value="other">🎯 Other</option>
          </select>
        </label>
      </div>

      <div class="row">
        <label class="grow">Notes (optional)
          <input type="text" id="f_notes" maxlength="200" placeholder="e.g. Foodpanda dinner" />
        </label>
        <button type="submit" id="f_submit" class="btn-primary">Add Transaction</button>
      </div>
    </form>
  </section>

  <!-- ─── SUMMARY CARDS ────────────────────────────────────── -->
  <section class="summary-grid">
    <div class="metric-card"><div class="metric-label">Net Worth</div><div class="metric-value" id="m_networth">—</div></div>
    <div class="metric-card"><div class="metric-label">Liquid Assets</div><div class="metric-value" id="m_liquid">—</div></div>
    <div class="metric-card"><div class="metric-label">CC Outstanding</div><div class="metric-value" id="m_cc">—</div></div>
    <div class="metric-card"><div class="metric-label">Personal Debts</div><div class="metric-value" id="m_debts">—</div></div>
  </section>

  <!-- ─── PER-ACCOUNT BALANCES ─────────────────────────────── -->
  <section class="card">
    <h2>🏦 Accounts</h2>
    <div id="accountsList" class="accounts-grid">Loading…</div>
  </section>

  <!-- ─── TOP DEBTS + BILLS DUE ────────────────────────────── -->
  <div class="two-col">
    <section class="card">
      <h2>💳 Top Debts</h2>
      <div id="topDebts">Loading…</div>
    </section>
    <section class="card">
      <h2>📅 Bills Due Soon</h2>
      <div id="billsDue">Loading…</div>
    </section>
  </div>

  <!-- ─── RECENT TRANSACTIONS ──────────────────────────────── -->
  <section class="card">
    <h2>📜 Recent Transactions</h2>
    <div id="recentTxns">Loading…</div>
  </section>

</main>

<!-- ─── TOAST ──────────────────────────────────────────────── -->
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="/js/store.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/hub.js"></script>
</body>
</html>
