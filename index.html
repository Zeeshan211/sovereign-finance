<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sovereign Finance</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-2: #334155;
      --text: #f1f5f9;
      --text-dim: #94a3b8;
      --accent: #10b981;
      --danger: #ef4444;
      --warn: #f59e0b;
      --border: #334155;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 16px 16px 80px;
      max-width: 600px;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
    }
    header { padding: 16px 0 24px; text-align: center; }
    .brand {
      font-size: 12px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
      font-weight: 500;
    }
    .title { font-size: 28px; font-weight: 800; margin-top: 4px; letter-spacing: -0.5px; }
    .day-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 14px;
      background: var(--surface-2);
      border-radius: 999px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .pulse {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .net-worth {
      background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
      border-radius: 16px;
      padding: 28px 20px;
      margin: 8px 0 20px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .nw-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .nw-value { font-size: 38px; font-weight: 800; letter-spacing: -1px; }
    .nw-value.positive { color: var(--accent); }
    .nw-value.negative { color: var(--danger); }
    .nw-currency { font-size: 16px; color: var(--text-dim); margin-left: 6px; font-weight: 500; }
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 6px;
    }
    .stat-value { font-size: 17px; font-weight: 700; }
    .stat-value.danger { color: var(--danger); }
    .stat-value.warn { color: var(--warn); }
    .stat-value.accent { color: var(--accent); }
    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .nav-card {
      background: var(--surface);
      padding: 22px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-align: center;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
    }
    .nav-card:active { transform: scale(0.97); }
    .nav-card:hover { border-color: var(--accent); }
    .nav-icon { font-size: 30px; margin-bottom: 8px; }
    .nav-label { font-size: 14px; font-weight: 600; }
    .nav-sub { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    footer {
      text-align: center;
      margin-top: 36px;
      padding: 20px 0;
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
    }
    footer .v { opacity: 0.5; font-size: 10px; }
  </style>
</head>
<body>
  <header>
    <div class="brand">Sovereign Ops</div>
    <h1 class="title">Finance</h1>
    <div class="day-badge"><span class="pulse"></span>Day <span id="dayNum">—</span> of 90</div>
  </header>

  <section class="net-worth">
    <div class="nw-label">Net Worth</div>
    <div class="nw-value positive">74,951<span class="nw-currency">PKR</span></div>
  </section>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Liquid</div>
      <div class="stat-value accent">133,351</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">CC Outstanding</div>
      <div class="stat-value danger">58,400</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Personal Debts</div>
      <div class="stat-value warn">223,500</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">True Burden</div>
      <div class="stat-value danger">-148,549</div>
    </div>
  </div>

  <div class="nav-grid">
    <div class="nav-card">
      <div class="nav-icon">💸</div>
      <div class="nav-label">Transactions</div>
      <div class="nav-sub">coming soon</div>
    </div>
    <div class="nav-card">
      <div class="nav-icon">🏦</div>
      <div class="nav-label">Accounts</div>
      <div class="nav-sub">10 active</div>
    </div>
    <div class="nav-card">
      <div class="nav-icon">💳</div>
      <div class="nav-label">Debts</div>
      <div class="nav-sub">2 remaining</div>
    </div>
    <div class="nav-card">
      <div class="nav-icon">📊</div>
      <div class="nav-label">Insights</div>
      <div class="nav-sub">coming soon</div>
    </div>
  </div>

  <footer>
    Built one baby step at a time.<br>
    <span class="v">v0.0.1 · sovereign-finance</span>
  </footer>

  <script>
    const QUEST_START = new Date('2026-04-25');
    const today = new Date();
    const diffMs = today - QUEST_START;
    const day = Math.floor(diffMs / (1000 * 60 * 60 * 24)) + 1;
    document.getElementById('dayNum').textContent = day;
  </script>
</body>
</html>
