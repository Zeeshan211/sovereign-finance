<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Sovereign Finance</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header>
    <div class="brand">Sovereign Ops</div>
    <h1 class="title">Finance</h1>
    <div class="day-badge"><span class="pulse"></span>Day <span id="dayNum">—</span> of 90</div>
  </header>

  <section class="net-worth">
    <div class="nw-label">Net Worth</div>
    <div id="hub-net-worth" class="nw-value positive">—<span class="nw-currency">PKR</span></div>
  </section>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Liquid</div>
      <div id="hub-liquid" class="stat-value accent">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">CC Outstanding</div>
      <div id="hub-cc" class="stat-value danger">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Personal Debts</div>
      <div id="hub-debts" class="stat-value warn">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">True Burden</div>
      <div id="hub-burden" class="stat-value danger">—</div>
    </div>
  </div>

  <div class="nav-grid">
    <a href="/transactions.html" class="nav-card">
      <div class="nav-icon">💸</div>
      <div class="nav-label">Transactions</div>
      <div class="nav-sub">view all</div>
    </a>
    <a href="/accounts.html" class="nav-card">
      <div class="nav-icon">🏦</div>
      <div class="nav-label">Accounts</div>
      <div class="nav-sub">11 active</div>
    </a>
    <a href="/debts.html" class="nav-card">
      <div class="nav-icon">💳</div>
      <div class="nav-label">Debts</div>
      <div class="nav-sub">snowball</div>
    </a>
    <a href="#" class="nav-card">
      <div class="nav-icon">📊</div>
      <div class="nav-label">Insights</div>
      <div class="nav-sub">coming soon</div>
    </a>
  </div>

  <footer>
    Built one baby step at a time.<br>
    <span class="v">v0.3.0 · sovereign-finance</span>
  </footer>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="/" class="nav-item active">
        <div class="nav-emoji">🏠</div>
        <div class="nav-text">Hub</div>
      </a>
      <a href="/add.html" class="nav-item">
        <div class="nav-emoji">➕</div>
        <div class="nav-text">Add</div>
      </a>
      <a href="/accounts.html" class="nav-item">
        <div class="nav-emoji">🏦</div>
        <div class="nav-text">Accounts</div>
      </a>
      <a href="/debts.html" class="nav-item">
        <div class="nav-emoji">💳</div>
        <div class="nav-text">Debts</div>
      </a>
    </div>
  </nav>

  <script src="/js/app.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/hub.js"></script>
</body>
</html>
