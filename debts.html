<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Debts · Sovereign Finance</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  <header>
    <div class="brand">Sovereign Ops</div>
    <h1 class="title">Debts</h1>
    <div class="day-badge"><span id="debts-summary">loading…</span></div>
  </header>

  <section class="net-worth">
    <div class="nw-label">You Owe</div>
    <div id="debts-total-owe" class="nw-value negative">—<span class="nw-currency">PKR</span></div>
  </section>

  <div class="section-header">
    <span class="section-label">Snowball Order · You Owe</span>
    <span id="debts-owe-count" class="section-total liabilities">— debts</span>
  </div>
  <div id="debts-owe-list"></div>

  <div class="section-header">
    <span class="section-label">Owed To You · Receivables</span>
    <span id="debts-owed-count" class="section-total assets">—</span>
  </div>
  <div id="debts-owed-list"></div>

  <footer>
    <span class="v">v0.3.0 · debts</span>
  </footer>

  <div id="payModal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-title" id="payModalTitle">Pay Debt</div>
      <div class="modal-sub" id="payModalSub">remaining …</div>

      <label class="field-label">Amount</label>
      <input id="payAmount" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0" class="amount-input">

      <label class="field-label">From Account</label>
      <select id="payAccount" class="form-select"></select>

      <label class="field-label">Date</label>
      <input id="payDate" type="date" class="form-input">

      <button id="payConfirm" class="primary-btn">Confirm Payment</button>
      <button id="payCancel" class="danger-btn">Cancel</button>
    </div>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="/" class="nav-item">
        <div class="nav-emoji">🏠</div>
        <div class="nav-text">Hub</div>
      </a>
      <a href="/add.html" class="nav-item">
        <div class="nav-emoji">➕</div>
        <div class="nav-text">Add</div>
      </a>
      <a href="/accounts.html" class="nav-item">
        <div class="nav-emoji">🏦</div>
        <div class="nav-text">Accounts</div>
      </a>
      <a href="/debts.html" class="nav-item active">
        <div class="nav-emoji">💳</div>
        <div class="nav-text">Debts</div>
      </a>
    </div>
  </nav>

  <script src="/js/app.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/debts.js"></script>
</body>
</html>
