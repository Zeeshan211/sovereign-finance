<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Debts · Sovereign Finance</title>
  <link rel="stylesheet" href="/css/app.css">
  <script src="/js/theme.js"></script>
  <script src="/js/nav.js" defer></script>
</head>
<body>
  <header>
    <div class="brand">Sovereign Ops</div>
    <h1 class="title">Debts</h1>
    <div class="day-badge"><span id="debts-summary">loading…</span></div>
  </header>

  <div class="debt-summary-row">
    <div class="debt-summary-card">
      <div class="debt-summary-label">You Owe</div>
      <div id="debts-total-owe" class="debt-summary-value danger">—</div>
      <div id="debts-owe-count" class="debt-summary-sub">— debts</div>
    </div>
    <div class="debt-summary-card">
      <div class="debt-summary-label">They Owe You</div>
      <div id="debts-total-owed" class="debt-summary-value accent">—</div>
      <div id="debts-owed-count" class="debt-summary-sub">— receivables</div>
    </div>
  </div>

  <div class="section-header">
    <span class="section-label">Snowball Order</span>
    <span class="section-total liabilities" id="debts-net-burden">—</span>
  </div>
  <div id="debts-owe-list"></div>

  <div class="section-header" id="receivables-header">
    <span class="section-label">Receivables</span>
  </div>
  <div id="debts-owed-list"></div>

  <footer>
    <span class="v">v0.3.2 · debts</span>
  </footer>

  <div id="payModal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-title" id="payModalTitle">Pay Debt</div>
      <div class="modal-sub" id="payModalSub">remaining …</div>

      <label class="field-label">Amount</label>
      <input id="payAmount" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0" class="amount-input">

      <label class="field-label">From Account</label>
      <select id="payAccount" class="form-select"></select>

      <label class="field-label">Date</label>
      <input id="payDate" type="date" class="form-input">

      <div class="modal-actions">
        <button id="payCancel" class="ghost-btn">Cancel</button>
        <button id="payConfirm" class="primary-btn">Confirm</button>
      </div>
    </div>
  </div>

  <div id="addDebtModal" class="modal-backdrop" style="display:none;">
    <div class="modal">
      <div class="modal-title" id="addDebtTitle">Add Debt</div>

      <label class="field-label">Name</label>
      <input id="addDebtName" type="text" placeholder="e.g. Bank Loan, Friend Ahmed" class="form-input" maxlength="80">

      <label class="field-label">Type</label>
      <select id="addDebtKind" class="form-select">
        <option value="owe">I Owe (liability)</option>
        <option value="owed">They Owe Me (receivable)</option>
      </select>

      <label class="field-label">Original Amount</label>
      <input id="addDebtAmount" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0" class="amount-input">

      <label class="field-label">Notes (optional)</label>
      <input id="addDebtNotes" type="text" placeholder="context, due date, terms…" class="form-input" maxlength="200">

      <div class="modal-actions">
        <button id="addDebtCancel" class="ghost-btn">Cancel</button>
        <button id="addDebtConfirm" class="primary-btn">Add Debt</button>
      </div>
    </div>
  </div>

    <aside class="desktop-nav">
    <a href="/" class="desktop-nav-item">
      <span class="nav-emoji">🏠</span>
      <span class="nav-text">Hub</span>
    </a>
    <a href="/add.html" class="desktop-nav-item">
      <span class="nav-emoji">➕</span>
      <span class="nav-text">Add Transaction</span>
    </a>
    <a href="/transactions.html" class="desktop-nav-item">
      <span class="nav-emoji">💸</span>
      <span class="nav-text">Transactions</span>
    </a>
    <a href="/accounts.html" class="desktop-nav-item">
      <span class="nav-emoji">🏦</span>
      <span class="nav-text">Accounts</span>
    </a>
    <a href="/debts.html" class="desktop-nav-item active">
      <span class="nav-emoji">💳</span>
      <span class="nav-text">Debts</span>
    </a>
  </aside>
    <div class="bottom-nav-inner">
      <a href="/" class="nav-item">
        <div class="nav-emoji">🏠</div>
        <div class="nav-text">Hub</div>
      </a>
      <a href="/add.html" class="nav-item">
        <div class="nav-emoji">➕</div>
        <div class="nav-text">Add</div>
      </a>
      <a href="/accounts.html" class="nav-item">
        <div class="nav-emoji">🏦</div>
        <div class="nav-text">Accounts</div>
      </a>
      <a href="/debts.html" class="nav-item active">
        <div class="nav-emoji">💳</div>
        <div class="nav-text">Debts</div>
      </a>
    </div>
  </nav>

  <script src="/js/app.js"></script>
  <script src="/js/store.js"></script>
  <script src="/js/numbers.js"></script>
  <script src="/js/debts.js"></script>
</body>
</html>
