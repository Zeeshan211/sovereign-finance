<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sovereign Finance — Monthly Close</title>
  <link rel="stylesheet" href="/css/app.css?v=1.0.2" />
  <script src="/js/theme.js?v=1.0.0" defer></script>
  <script src="/js/nav.js?v=1.1.3" defer></script>
  <style>
    :root {
      --bg: #f6f8fb;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --text: #0f172a;
      --muted: #475569;
      --dim: #64748b;
      --border: rgba(148, 163, 184, 0.28);
      --green: #16a34a;
      --green-soft: #dcfce7;
      --red: #dc2626;
      --red-soft: #fee2e2;
      --amber: #d97706;
      --amber-soft: #fef3c7;
      --blue: #2563eb;
      --blue-soft: #dbeafe;
      --shadow: 0 18px 46px rgba(15, 23, 42, 0.09);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      min-width: 0;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      max-width: 100%;
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(34, 197, 94, 0.12), transparent 30%),
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.10), transparent 32%),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
    }

    .page {
      width: 100%;
      max-width: var(--sf-content-max, 1440px);
      margin-inline: auto;
      padding: 24px 16px 72px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.74);
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    h1 {
      margin: 12px 0 7px;
      font-size: clamp(30px, 4vw, 52px);
      line-height: 0.98;
      letter-spacing: -0.07em;
    }

    .subtitle {
      margin: 0;
      max-width: 780px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.55;
      font-weight: 650;
    }

    .controls {
      display: flex;
      align-items: end;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control {
      display: grid;
      gap: 5px;
    }

    .control label {
      color: var(--dim);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    input[type="month"] {
      height: 42px;
      min-width: 160px;
      padding: 0 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      font: inherit;
      font-weight: 850;
    }

    button {
      height: 42px;
      padding: 0 14px;
      border: 0;
      border-radius: 14px;
      background: var(--text);
      color: #fff;
      font: inherit;
      font-size: 13px;
      font-weight: 950;
      cursor: pointer;
    }

    .panel {
      min-width: 0;
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.90);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-pad {
      padding: 18px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
      gap: 16px;
      margin: 18px 0;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .status-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--border);
      background: #fff;
      min-width: 0;
    }

    .status-card.ready {
      border-color: rgba(22, 163, 74, 0.26);
      background: linear-gradient(135deg, rgba(220, 252, 231, 0.9), #fff);
    }

    .status-card.not-ready,
    .status-card.critical {
      border-color: rgba(220, 38, 38, 0.22);
      background: linear-gradient(135deg, rgba(254, 226, 226, 0.90), #fff);
    }

    .status-card.watch {
      border-color: rgba(217, 119, 6, 0.26);
      background: linear-gradient(135deg, rgba(254, 243, 199, 0.90), #fff);
    }

    .status-card h2 {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .status-value {
      margin: 0;
      font-size: clamp(26px, 4vw, 42px);
      line-height: 0.98;
      font-weight: 1000;
      letter-spacing: -0.07em;
    }

    .status-note {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 700;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      min-width: 0;
      padding: 14px;
      border-radius: 18px;
      background: var(--surface-2);
      border: 1px solid rgba(148, 163, 184, 0.20);
    }

    .metric label {
      display: block;
      margin-bottom: 6px;
      color: var(--dim);
      font-size: 10px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: 19px;
      line-height: 1.05;
      font-weight: 1000;
      letter-spacing: -0.04em;
    }

    .metric small {
      display: block;
      margin-top: 5px;
      color: var(--dim);
      font-size: 11px;
      line-height: 1.35;
      font-weight: 750;
    }

    .section-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 16px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(248, 250, 252, 0.84);
    }

    .section-title h2 {
      margin: 0;
      font-size: 17px;
      letter-spacing: -0.03em;
    }

    .section-title p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 950;
      white-space: nowrap;
      border: 1px solid transparent;
      text-transform: capitalize;
    }

    .badge.ready,
    .badge.pass,
    .badge.safe,
    .badge.high {
      color: #166534;
      background: var(--green-soft);
      border-color: rgba(22, 163, 74, 0.18);
    }

    .badge.not-ready,
    .badge.not_ready,
    .badge.fail,
    .badge.critical,
    .badge.unsafe,
    .badge.low {
      color: #991b1b;
      background: var(--red-soft);
      border-color: rgba(220, 38, 38, 0.18);
    }

    .badge.watch,
    .badge.medium,
    .badge.medium_low,
    .badge.warning {
      color: #92400e;
      background: var(--amber-soft);
      border-color: rgba(217, 119, 6, 0.18);
    }

    .badge.info {
      color: #1d4ed8;
      background: var(--blue-soft);
      border-color: rgba(37, 99, 235, 0.18);
    }

    .list {
      display: grid;
      gap: 9px;
      padding: 16px 18px 18px;
    }

    .item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px;
      border-radius: 16px;
      background: var(--surface-2);
      border: 1px solid rgba(148, 163, 184, 0.18);
      min-width: 0;
    }

    .item-mark {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: #fff;
      border: 1px solid rgba(148, 163, 184, 0.22);
      font-size: 12px;
      font-weight: 1000;
    }

    .item strong {
      display: block;
      font-size: 13px;
      line-height: 1.25;
      font-weight: 950;
    }

    .item span {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      font-weight: 650;
    }

    details.audit-details {
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    details.audit-details > summary {
      cursor: pointer;
      list-style: none;
      padding: 16px 18px;
      background: rgba(248, 250, 252, 0.90);
      font-weight: 1000;
      letter-spacing: -0.02em;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    details.audit-details > summary::-webkit-details-marker {
      display: none;
    }

    .detail-body {
      padding: 0 18px 18px;
    }

    .table-wrap {
      width: 100%;
      max-width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
      font-size: 12px;
    }

    th,
    td {
      text-align: left;
      padding: 10px 8px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.20);
      vertical-align: top;
    }

    th {
      color: var(--dim);
      font-size: 10px;
      font-weight: 1000;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    td {
      color: var(--text);
      font-weight: 750;
    }

    .muted {
      color: var(--muted);
    }

    .loading,
    .error,
    .empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
      font-weight: 750;
    }

    .error {
      color: #991b1b;
    }

    @media (max-width: 1180px) {
      .hero,
      .section-grid {
        grid-template-columns: 1fr;
      }

      .kpi-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      .page {
        padding: 18px 10px 90px;
      }

      .topbar {
        display: grid;
      }

      .controls,
      .control,
      input[type="month"],
      button {
        width: 100%;
      }

      .status-grid,
      .kpi-grid {
        grid-template-columns: 1fr;
      }

      .panel-pad,
      .section-title,
      .list,
      .detail-body {
        padding-left: 14px;
        padding-right: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page app-page">
    <div class="topbar">
      <div>
        <div class="eyebrow">Monthly Close</div>
        <h1>Finance Close Center</h1>
        <p class="subtitle">
          One screen for month-end judgment: close readiness, money pressure, blockers, and the exact next action.
          Detailed checks stay below the fold.
        </p>
      </div>
      <div class="controls">
        <div class="control">
          <label for="monthInput">Close month</label>
          <input id="monthInput" type="month" />
        </div>
        <button id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>

    <div id="app">
      <section class="panel loading">Loading Monthly Close...</section>
    </div>
  </main>

  <script>
    window.SovereignMonthlyClose = { version: "0.2.2", mode: "trial-clean-visual" };

    const app = document.getElementById("app");
    const monthInput = document.getElementById("monthInput");
    const refreshBtn = document.getElementById("refreshBtn");

    function currentMonth() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
    }

    monthInput.value = new URLSearchParams(location.search).get("month") || currentMonth();
    refreshBtn.addEventListener("click", loadMonthlyClose);

    monthInput.addEventListener("change", () => {
      const url = new URL(location.href);
      url.searchParams.set("month", monthInput.value);
      history.replaceState(null, "", url.toString());
      loadMonthlyClose();
    });

    function money(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "N/A";
      return `Rs ${n.toLocaleString("en-PK", { maximumFractionDigits: 2 })}`;
    }

    function text(value, fallback = "N/A") {
      if (value === null || value === undefined || value === "") return fallback;
      return String(value);
    }

    function esc(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function statusClass(value) {
      return String(value || "unknown").toLowerCase().replace(/\s+/g, "_");
    }

    function cleanStatus(value) {
      return String(value || "unknown").replace(/_/g, " ");
    }

    function badge(value, label) {
      const cls = statusClass(value);
      return `<span class="badge ${esc(cls)}">${esc(label || cleanStatus(value))}</span>`;
    }

    function item(mark, title, note) {
      return `
        <div class="item">
          <div class="item-mark">${esc(mark)}</div>
          <div>
            <strong>${esc(title)}</strong>
            <span>${esc(note)}</span>
          </div>
        </div>
      `;
    }

    function systemCertificationStatus(data) {
      const ready = data &&
        data.ok === true &&
        data.scopes &&
        data.scopes.month_activity_scope &&
        data.scopes.full_ledger_scope &&
        data.reconciliation &&
        data.audit_readiness &&
        data.audit_readiness.audit_scope_ready &&
        data.audit_readiness.audit_scope_ready.api_routes === true &&
        data.audit_readiness.audit_scope_ready.formulas === true &&
        data.audit_readiness.audit_scope_ready.reconciliation === true &&
        data.audit_readiness.audit_scope_ready.manual_variable_separation === true &&
        data.audit_readiness.audit_scope_ready.required_data === true &&
        data.audit_readiness.audit_scope_ready.month_activity_scope_separated === true &&
        data.audit_readiness.audit_scope_ready.full_ledger_truth_scope_separated === true;

      return ready ? "ready" : "not_ready";
    }

    function moneyCloseStatus(data) {
      return data && data.audit_readiness ? data.audit_readiness.status : "unknown";
    }

    function safetyStatus(data) {
      return data && data.safety ? data.safety.status : "unknown";
    }

    function reconciliationStatus(data) {
      const r = data && data.reconciliation ? data.reconciliation : {};
      if (Number(r.drifted_count || 0) > 0) return "critical";
      if (Number(r.stale_count || 0) > 0 || Number(r.undeclared_count || 0) > 0) return "watch";
      return "ready";
    }

    function blockerTitle(code) {
      const map = {
        forecast_has_unsafe_date: "Forecast has an unsafe date",
        forecast_has_unsafe_days: "Forecast has unsafe days",
        safety_status_critical: "Safety Engine is critical",
        safety_status_unsafe: "Safety Engine is unsafe",
        reconciliation_drift: "Reconciliation has drift",
        manual_variables_used_for_safety: "Manual variables are affecting safety",
        forecast_api_unavailable: "Forecast unavailable",
        safety_api_unavailable: "Safety signal unavailable"
      };
      return map[code] || code;
    }

    function blockerMeaning(code) {
      const map = {
        forecast_has_unsafe_date: "Cash is projected to fall below the safe threshold before or around salary.",
        forecast_has_unsafe_days: "The 30-day projection contains unsafe cash days.",
        safety_status_critical: "The safety view found a real-world action risk.",
        safety_status_unsafe: "The safety view is reporting unsafe status.",
        reconciliation_drift: "At least one declared balance does not match the app balance.",
        manual_variables_used_for_safety: "Safety math should stay conservative and avoid speculative income.",
        forecast_api_unavailable: "Monthly Close cannot certify without forecast data.",
        safety_api_unavailable: "Monthly Close cannot certify without safety data."
      };
      return map[code] || "Review this blocker before treating the month as closed.";
    }

    function warningTitle(code) {
      const map = {
        undeclared_accounts: "Some accounts are undeclared",
        stale_account_declarations: "Some declarations are stale",
        bills_missing_required_data: "Bills missing required data",
        debts_missing_required_data: "Debts missing required data",
        insights_api_unavailable: "Insights unavailable"
      };
      return map[code] || code;
    }

    function warningMeaning(code) {
      const map = {
        undeclared_accounts: "Declare real balances for active accounts so close confidence improves.",
        stale_account_declarations: "New transactions happened after declaration. Re-declare affected accounts.",
        bills_missing_required_data: "Some bills need due date or default account details.",
        debts_missing_required_data: "Some debts need due date information.",
        insights_api_unavailable: "Insights are useful but not a hard close blocker."
      };
      return map[code] || "Review this warning before final close.";
    }

    function blockersList(data, maxItems) {
      const blockers = data.audit_readiness?.blockers || [];
      const warnings = data.audit_readiness?.warnings || [];
      const rows = [
        ...blockers.map(x => ["!", blockerTitle(x), blockerMeaning(x)]),
        ...warnings.map(x => ["", warningTitle(x), warningMeaning(x)])
      ];

      if (!rows.length) {
        return item("", "No close blockers", "Money Close is ready based on current rules.");
      }

      return rows.slice(0, maxItems || rows.length).map(row => item(row[0], row[1], row[2])).join("");
    }

    function reviewChecks(data) {
      const a = data.audit_readiness?.audit_scope_ready || {};
      const checks = [
        ["Core routes healthy", a.api_routes],
        ["Formulas readable", a.formulas],
        ["Balances reconciled", a.reconciliation],
        ["Manual variables separated", a.manual_variable_separation],
        ["Required data present", a.required_data],
        ["Monthly activity separated", a.month_activity_scope_separated],
        ["Full history protected", a.full_ledger_truth_scope_separated]
      ];

      return checks.map(([name, pass]) => item(pass ? "" : "!", name, pass ? "Passed" : "Needs review")).join("");
    }

    function reconciliationRows(data) {
      const rows = data.reconciliation?.accounts || [];
      if (!rows.length) return `<div class="empty">No reconciliation rows returned.</div>`;

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Account</th>
                <th>Status</th>
                <th>App balance</th>
                <th>Declared</th>
                <th>Drift</th>
                <th>Latest activity</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map(row => `
                <tr>
                  <td><strong>${esc(row.account_name || "Account")}</strong></td>
                  <td>${badge(row.status, cleanStatus(row.status))}</td>
                  <td>${money(row.app_balance)}</td>
                  <td>${row.declared_balance === null || row.declared_balance === undefined ? "N/A" : money(row.declared_balance)}</td>
                  <td>${row.drift === null || row.drift === undefined ? "N/A" : money(row.drift)}</td>
                  <td>${esc(row.latest_transaction_date || "N/A")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function render(data) {
      const systemStatus = systemCertificationStatus(data);
      const closeStatus = moneyCloseStatus(data);
      const safeStatus = safetyStatus(data);
      const reconStatus = reconciliationStatus(data);

      app.innerHTML = `
        <section class="hero">
          <div class="panel panel-pad">
            <div class="status-grid">
              <div class="status-card ${systemStatus === "ready" ? "ready" : "not-ready"}">
                <h2>System readiness</h2>
                <p class="status-value">${systemStatus === "ready" ? "READY" : "CHECK"}</p>
                <p class="status-note">Core finance checks are readable for this close view.</p>
              </div>
              <div class="status-card ${closeStatus === "ready" ? "ready" : "not-ready"}">
                <h2>Money close</h2>
                <p class="status-value">${closeStatus === "ready" ? "READY" : "NOT READY"}</p>
                <p class="status-note">Real cash safety, unsafe dates, stale declarations, and close blockers.</p>
              </div>
            </div>
          </div>

          <div class="panel panel-pad">
            <div class="kpi-grid">
              <div class="metric">
                <label>Safety</label>
                <strong>${esc(safeStatus).toUpperCase()}</strong>
                <small>${esc(data.safety?.top_action || "No action returned")}</small>
              </div>
              <div class="metric">
                <label>First unsafe</label>
                <strong>${esc(data.forecast?.first_unsafe_date || "N/A")}</strong>
                <small>${esc(data.forecast?.runway_status || "N/A")}</small>
              </div>
              <div class="metric">
                <label>Liquid</label>
                <strong>${money(data.summary?.current_liquid)}</strong>
                <small>Current usable cash signal</small>
              </div>
              <div class="metric">
                <label>Credit Card</label>
                <strong>${money(data.summary?.cc_outstanding)}</strong>
                <small>Outstanding balance signal</small>
              </div>
            </div>
          </div>
        </section>

        <section class="section-grid">
          <div class="panel">
            <div class="section-title">
              <div>
                <h2>Top Close Blockers</h2>
                <p>What must be handled before this month can be considered clean.</p>
              </div>
              ${badge(closeStatus, cleanStatus(closeStatus))}
            </div>
            <div class="list">${blockersList(data, 4)}</div>
          </div>

          <div class="panel">
            <div class="section-title">
              <div>
                <h2>Next Action</h2>
                <p>The shortest path from not ready to close-ready.</p>
              </div>
              ${badge(safeStatus, cleanStatus(safeStatus))}
            </div>
            <div class="list">
              ${item("1", "Fix the first unsafe date", data.safety?.top_action || "Open Forecast and resolve the first unsafe date.")}
              ${item("2", "Update stale declarations", "Re-declare accounts that changed after their last declared balance.")}
              ${item("3", "Declare active undeclared accounts", "Declare real balances for active accounts so close confidence improves.")}
            </div>
          </div>
        </section>

        <details class="audit-details">
          <summary>
            <span>Review Checks</span>
            ${badge(systemStatus, cleanStatus(systemStatus))}
          </summary>
          <div class="detail-body">
            <div class="list">${reviewChecks(data)}</div>
          </div>
        </details>

        <details class="audit-details">
          <summary>
            <span>Forecast Safety</span>
            ${badge(safeStatus, cleanStatus(safeStatus))}
          </summary>
          <div class="detail-body">
            <div class="kpi-grid" style="margin-top: 16px;">
              <div class="metric">
                <label>Unsafe days</label>
                <strong>${text(data.forecast?.unsafe_days_count)}</strong>
                <small>Near-term projection</small>
              </div>
              <div class="metric">
                <label>Lowest balance</label>
                <strong>${money(data.forecast?.lowest_projected_balance)}</strong>
                <small>${esc(data.forecast?.lowest_projected_balance_date || "N/A")}</small>
              </div>
              <div class="metric">
                <label>After salary + obligations</label>
                <strong>${money(data.forecast?.cash_after_salary_and_obligations)}</strong>
                <small>Conservative baseline</small>
              </div>
              <div class="metric">
                <label>Variable income</label>
                <strong>${data.forecast?.manual_variables_separated ? "Separated" : "Check"}</strong>
                <small>Safety stays conservative</small>
              </div>
            </div>
          </div>
        </details>

        <details class="audit-details">
          <summary>
            <span>Monthly Activity</span>
            ${badge("info", data.month)}
          </summary>
          <div class="detail-body">
            <div class="kpi-grid" style="margin-top: 16px;">
              <div class="metric">
                <label>Income</label>
                <strong>${money(data.month_activity?.income_total)}</strong>
                <small>${text(data.income?.count, 0)} rows</small>
              </div>
              <div class="metric">
                <label>Outflow</label>
                <strong>${money(data.month_activity?.outflow_total)}</strong>
                <small>${text(data.outflow?.count, 0)} rows</small>
              </div>
              <div class="metric">
                <label>Net movement</label>
                <strong>${money(data.month_activity?.net_income_minus_outflow)}</strong>
                <small>Income minus outflow</small>
              </div>
              <div class="metric">
                <label>Transfers</label>
                <strong>${money(data.month_activity?.transfer_movement_total)}</strong>
                <small>${text(data.month_activity?.transfer_count, 0)} rows</small>
              </div>
            </div>
          </div>
        </details>

        <details class="audit-details">
          <summary>
            <span>Bills, Debts, and Receivables</span>
            ${badge("info", "split")}
          </summary>
          <div class="detail-body">
            <div class="kpi-grid" style="margin-top: 16px;">
              <div class="metric">
                <label>Bills due</label>
                <strong>${money(data.bills?.due_total)}</strong>
                <small>${text(data.bills?.unpaid_count, 0)} unpaid</small>
              </div>
              <div class="metric">
                <label>Payable debt</label>
                <strong>${money(data.debts?.total_payable_remaining)}</strong>
                <small>${text(data.debts?.payable_count, 0)} active</small>
              </div>
              <div class="metric">
                <label>Receivables</label>
                <strong>${money(data.debts?.total_receivable_remaining)}</strong>
                <small>${text(data.debts?.receivable_count, 0)} active</small>
              </div>
              <div class="metric">
                <label>Debt paid this month</label>
                <strong>${money(data.debts?.debt_paid_this_month)}</strong>
                <small>${text(data.debts?.debt_payment_count_this_month, 0)} payments</small>
              </div>
            </div>
          </div>
        </details>

        <details class="audit-details">
          <summary>
            <span>Reconciliation</span>
            ${badge(reconStatus, cleanStatus(reconStatus))}
          </summary>
          <div class="detail-body">
            <div class="kpi-grid" style="margin-top: 16px;">
              <div class="metric">
                <label>Matched</label>
                <strong>${text(data.reconciliation?.matched_count, 0)}</strong>
                <small>Accounts</small>
              </div>
              <div class="metric">
                <label>Stale</label>
                <strong>${text(data.reconciliation?.stale_count, 0)}</strong>
                <small>Needs re-declare</small>
              </div>
              <div class="metric">
                <label>Undeclared</label>
                <strong>${text(data.reconciliation?.undeclared_count, 0)}</strong>
                <small>Needs declaration</small>
              </div>
              <div class="metric">
                <label>Drifted</label>
                <strong>${text(data.reconciliation?.drifted_count, 0)}</strong>
                <small>Hard issue if above zero</small>
              </div>
            </div>
            ${reconciliationRows(data)}
          </div>
        </details>
      `;
    }

    async function loadMonthlyClose() {
      app.innerHTML = `<section class="panel loading">Loading Monthly Close...</section>`;

      try {
        const month = monthInput.value || currentMonth();
        const res = await fetch(`/api/monthly-close?month=${encodeURIComponent(month)}`, { cache: "no-store" });
        const data = await res.json();

        if (!res.ok || !data || data.ok === false) {
          throw new Error((data && data.error) || `HTTP ${res.status}`);
        }

        render(data);

        if (window.SovereignNav && typeof window.SovereignNav.checkOverflow === "function") {
          window.setTimeout(window.SovereignNav.checkOverflow, 150);
        }
      } catch (error) {
        app.innerHTML = `
          <section class="panel error">
            <h2>Monthly Close could not load</h2>
            <p>${esc(error.message || String(error))}</p>
          </section>
        `;
      }
    }

    loadMonthlyClose();
  </script>
</body>
</html>
